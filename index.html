<!DOCTYPE html>
<html>
<head>
  <title>Redirecting to Payment...</title>

  <script>
    // Function to get the amount from URL path
    function getAmountFromURL() {
      // Get the current path (e.g., "/99" or "/149")
      let path = window.location.pathname;
      
      // Remove the leading slash
      let amountStr = path.substring(1);
      
      // If path is empty or not a valid number, default to 99
      let amount = parseInt(amountStr);
      if (isNaN(amount) || amount <= 0) {
        amount = 99;
      }
      
      return amount;
    }

    // Get the amount
    const amount = getAmountFromURL();
    
    // Create the UPI payment URL
    const upiUrl = `upi://pay?pa=xlgr@ptyes&pn=Payment&am=${amount}&cu=INR&tn=Premium Access`;
    
    // Auto redirect after 1 second
    setTimeout(function() {
      window.location.href = upiUrl;
    }, 1000);
    
    // Store the amount for the button
    window.paymentAmount = amount;
  </script>

</head>

<body style="text-align:center; font-family:sans-serif; padding-top:50px;">

  <h2>Redirecting to Payment...</h2>
  <p id="amount-display" style="font-size: 24px; font-weight: bold; color: #4CAF50;">Loading...</p>
  <p>Agar automatically open nahi hota, neeche button dabao 👇</p>

  <a href="#" id="payment-link">
    <button style="padding:12px 20px; font-size:18px; cursor:pointer;">
      💳 Pay ₹<span id="button-amount">99</span>
    </button>
  </a>

  <script>
    // Update the display with the actual amount
    const amount = window.paymentAmount;
    document.getElementById('amount-display').innerHTML = `₹${amount} Payment`;
    document.getElementById('button-amount').textContent = amount;
    
    // Update the button link
    const upiUrl = `upi://pay?pa=xlgr@ptyes&pn=Payment&am=${amount}&cu=INR&tn=Premium Access`;
    document.getElementById('payment-link').href = upiUrl;
  </script>

</body>
</html>
